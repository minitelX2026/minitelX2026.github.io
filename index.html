<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minitel X Terminal</title>
    <style>
        /* Style de base Terminal */
        body {
            background-color: #0a0e14;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Conteneur Principal */
        .main-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* Barre d'icônes Pixel Art */
        .icon-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
        }

        .pixel-icon {
            width: 48px;
            height: 48px;
            image-rendering: pixelated;
            filter: drop-shadow(0 0 4px #00ff66);
        }

        /* Fenêtre du Terminal */
        .terminal {
            background-color: #11161f;
            border: 2px solid #00ff66;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 0 30px rgba(0, 255, 102, 0.2);
            width: 90%;
            max-width: 500px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 20pt;
            text-align: center;
            margin: 0 0 5px 0;
            text-shadow: 0 0 8px rgba(0, 255, 102, 0.6);
            letter-spacing: 1px;
        }

        .status {
            text-align: center;
            font-size: 10pt;
            color: #00aa44;
            margin-bottom: 25px;
        }

        textarea {
            width: 100%;
            height: 120px;
            background-color: #05070a;
            color: #00ff66;
            border: 1px solid #00ff66;
            border-radius: 5px;
            padding: 12px;
            font-family: monospace;
            font-size: 12pt;
            resize: none;
            box-sizing: border-box;
        }

        textarea:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.5);
        }

        button {
            width: 100%;
            margin-top: 15px;
            background-color: #00ff66;
            color: #0a0e14;
            border: none;
            padding: 14px;
            font-size: 12pt;
            font-weight: bold;
            font-family: monospace;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.2s;
        }

        button:hover {
            background-color: #00cc52;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.4);
        }

        /* ÉCRAN D'ANIMATION (Caché par défaut) */
        #animation-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #0a0e14;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .scene {
            position: relative;
            width: 600px;
            height: 300px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 50px;
            box-sizing: border-box;
        }

        /* Arc de cercle en pointillés (comme des lignes sur la route) */
        .road-arc {
            position: absolute;
            top: 50px;
            left: 100px;
            width: 400px;
            height: 400px;
            border: 3px dashed #00ff66;
            border-radius: 50%;
            clip-path: inset(0 0 50% 0); /* Garde uniquement le haut du cercle */
            filter: drop-shadow(0 0 5px rgba(0,255,102,0.5));
        }

        /* Le dossier qui voyage */
        .moving-folder {
            position: absolute;
            width: 24px;
            height: 24px;
            fill: #00ff66;
            offset-path: path('M 100 250 A 200 200 0 0 1 500 250'); /* Trajectoire en arc */
            animation: travel 2.5s infinite linear;
            filter: drop-shadow(0 0 8px #00ff66);
        }

        @keyframes travel {
            0% { offset-distance: 0%; scale: 0.8; }
            50% { offset-distance: 50%; scale: 1.2; }
            100% { offset-distance: 100%; scale: 0.8; }
        }

        /* Barre de progression de 10 secondes */
        .progress-container {
            width: 300px;
            height: 10px;
            border: 1px solid #00ff66;
            margin-top: 40px;
            padding: 2px;
            border-radius: 3px;
        }

        .progress-bar {
            height: 100%;
            background-color: #00ff66;
            width: 0%;
            animation: load 10s linear forwards;
            box-shadow: 0 0 8px #00ff66;
        }

        @keyframes load {
            to { width: 100%; }
        }

        .loading-text {
            margin-top: 15px;
            font-size: 12pt;
            letter-spacing: 2px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body>

    <!-- INTERFACE PRINCIPALE -->
    <div class="main-wrapper" id="main-interface">
        <!-- Barre d'icônes Pixel Art en SVG -->
        <div class="icon-bar">
            <!-- Icône PS One (Pixel) -->
            <svg class="pixel-icon" viewBox="0 0 16 16" fill="#00ff66">
                <path d="M1,4 h4 v2 h-2 v4 h2 v2 h-4 z M5,6 h6 v4 h-6 z M7,7 h2 v2 h-2 z M11,4 h4 v8 h-4 v-2 h2 v-4 h-2 z"/>
            </svg>
            <!-- Icône Minitel (Pixel) -->
            <svg class="pixel-icon" viewBox="0 0 16 16" fill="#00ff66">
                <path d="M2,2 h12 v9 h-12 z M3,3 h10 v6 h-10 z M1,12 h14 v2 h-14 z M4,13 h8 v1 h-8 z"/>
            </svg>
            <!-- Icône Téléphone Fixe à Cadran (Pixel) -->
            <svg class="pixel-icon" viewBox="0 0 16 16" fill="#00ff66">
                <path d="M4,2 h8 v2 h-8 z M2,5 h12 v2 h-12 z M1,8 h14 v6 h-14 z M4,10 h2 v2 h-2 z M10,10 h2 v2 h-2 z"/>
            </svg>
        </div>

        <!-- Boîte du Terminal -->
        <div class="terminal">
            <h1>[ MINITEL X SYSTEM ]</h1>
            <div class="status">Statut : En ligne | Prêt pour ESP32</div>
            
            <form id="msgForm" action="/envoyer" method="GET">
                <textarea name="msg" placeholder="Entrez le message à transmettre..." required></textarea>
                <button type="submit">TRANSMETTRE LE MESSAGE</button>
            </form>
        </div>
    </div>

    <!-- ÉCRAN D'ANIMATION RETRO (10 SECONDES) -->
    <div id="animation-screen">
        <div class="scene">
            <!-- Arc de cercle style pointillés de route -->
            <div class="road-arc"></div>

            <!-- Dossier volant -->
            <svg class="moving-folder" viewBox="0 0 24 24">
                <path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V6h5.17l2 2H20v10z"/>
            </svg>

            <!-- PC Émetteur (Pixel) -->
            <svg width="64" height="64" viewBox="0 0 16 16" fill="#00ff66" style="filter: drop-shadow(0 0 6px #00ff66);">
                <path d="M2,2 h12 v8 h-12 z M3,3 h10 v6 h-10 z M6,11 h4 v2 h-4 z M1,13 h14 v1 h-14 z"/>
            </svg>

            <!-- Minitel Récepteur (Pixel) -->
            <svg width="64" height="64" viewBox="0 0 16 16" fill="#00ff66" style="filter: drop-shadow(0 0 6px #00ff66);">
                <path d="M2,2 h12 v9 h-12 z M3,3 h10 v6 h-10 z M1,12 h14 v2 h-14 z M4,13 h8 v1 h-8 z"/>
            </svg>
        </div>

        <!-- Chargement -->
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
        <div class="loading-text">CONNEXION ESP32... TRANSMISSION EN COURS</div>
    </div>

    <!-- Script pour intercepter le clic et lancer la transition de 10s -->
    <script>
        document.getElementById('msgForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Bloque le départ immédiat vers la 404
            
            // Bascule les écrans
            document.getElementById('main-interface').style.display = 'none';
            document.getElementById('animation-screen').style.display = 'flex';
            
            // Attend 10 secondes (10000 millisecondes) avant d'envoyer vers GitHub /envoyer
            setTimeout(() => {
                this.submit();
            }, 10000);
        });
    </script>

</body>
</html>
