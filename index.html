<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minitel X Terminal</title>
    <style>
        body {
            background-color: #05070a;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* --- ANIMATION DES ICÔNES FLOTTANTES (ARRIÈRE-PLAN) --- */
        .floating-bg-icon {
            position: absolute;
            fill: rgba(0, 255, 102, 0.15);
            filter: drop-shadow(0 0 3px rgba(0, 255, 102, 0.3));
            animation: float-around 12s infinite ease-in-out;
            z-index: 1;
        }

        #bg-icon-ps { width: 50px; height: 50px; top: 10%; left: 15%; animation-delay: 0s; }
        #bg-icon-mini { width: 55px; height: 55px; top: 20%; right: 12%; animation-delay: 3s; }
        #bg-icon-phone { width: 50px; height: 50px; bottom: 15%; left: 10%; animation-delay: 6s; }
        #bg-icon-pc { width: 55px; height: 55px; bottom: 25%; right: 15%; animation-delay: 9s; }

        @keyframes float-around {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        /* --- INTERFACE PRINCIPALE --- */
        .terminal-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 400px;
            box-sizing: border-box;
        }

        .terminal {
            background-color: rgba(17, 22, 31, 0.9);
            border: 2px solid #00ff66;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 25px rgba(0, 255, 102, 0.2);
            box-sizing: border-box;
        }

        h1 {
            font-size: 18pt;
            text-align: center;
            margin: 0 0 5px 0;
            text-shadow: 0 0 8px rgba(0, 255, 102, 0.6);
        }

        .status {
            text-align: center;
            font-size: 9pt;
            color: #00aa44;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 110px;
            background-color: #05070a;
            color: #00ff66;
            border: 1px solid #00ff66;
            border-radius: 5px;
            padding: 10px;
            font-family: monospace;
            font-size: 11pt;
            resize: none;
            box-sizing: border-box;
        }

        textarea:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.5);
        }

        button {
            width: 100%;
            margin-top: 15px;
            background-color: #00ff66;
            color: #0a0e14;
            border: none;
            padding: 12px;
            font-size: 11pt;
            font-weight: bold;
            font-family: monospace;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.2s;
        }

        button:hover {
            background-color: #00cc52;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.4);
        }

        /* --- ÉCRAN D'ANIMATION CORRIGÉ POUR TÉLÉPHONE --- */
        #animation-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #05070a;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* La zone de dessin est réduite pour ne pas dépasser du smartphone */
        .scene {
            position: relative;
            width: 320px;
            height: 200px;
            box-sizing: border-box;
        }

        /* Arc de cercle adapté aux dimensions de la scène mobile */
        .road-arc {
            position: absolute;
            top: 50px;
            left: 35px;
            width: 250px;
            height: 250px;
            border: 3px dashed #00ff66;
            border-radius: 50%;
            clip-path: inset(0 0 50% 0);
            box-sizing: border-box;
        }

        /* Gros dossier vert en pixels */
        .moving-folder {
            position: absolute;
            width: 28px;
            height: 28px;
            fill: #00ff66;
            /* La trajectoire SVG correspond exactement aux dimensions de l'arc (.road-arc) */
            offset-path: path('M 35 175 A 125 125 0 0 1 285 175');
            animation: travel 2.5s infinite linear;
            filter: drop-shadow(0 0 8px #00ff66);
        }

        @keyframes travel {
            0% { offset-distance: 0%; }
            100% { offset-distance: 100%; }
        }

        /* Icônes de l'animation calées aux extrémités de l'arc */
        .hardware-icon {
            position: absolute;
            bottom: 5px;
            fill: #00ff66;
            filter: drop-shadow(0 0 6px #00ff66);
        }

        .icon-left { left: 10px; }
        .icon-right { right: 10px; }

        /* Barre de chargement et texte */
        .progress-container {
            width: 260px;
            height: 10px;
            border: 1px solid #00ff66;
            margin-top: 30px;
            padding: 2px;
            border-radius: 3px;
        }

        .progress-bar {
            height: 100%;
            background-color: #00ff66;
            width: 0%;
            animation: load 10s linear forwards;
            box-shadow: 0 0 8px #00ff66;
        }

        @keyframes load { to { width: 100%; } }

        .loading-text {
            margin-top: 15px;
            font-size: 10pt;
            width: 280px;
            text-align: center;
            letter-spacing: 1px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <svg class="floating-bg-icon" id="bg-icon-ps" viewBox="0 0 32 32">
        <path d="M2,12 L8,10 L12,10 L16,12 L20,10 L24,10 L30,12 L28,22 L24,24 L20,20 L12,20 L8,24 L4,22 Z M6,13 L8,13 L8,15 L6,15 Z M4,15 L6,15 L6,17 L4,17 Z M24,13 A 1.5 1.5 0 1 0 24,16 A 1.5 1.5 0 1 0 24,13 M26,16 A 1.5 1.5 0 1 0 26,19 A 1.5 1.5 0 1 0 26,16"/>
    </svg>
    <svg class="floating-bg-icon" id="bg-icon-mini" viewBox="0 0 32 32">
        <path d="M4,4 H28 V20 H4 Z M6,6 H26 V18 H6 Z M2,22 H30 V26 H2 Z M8,23 H24 V24 H8 Z"/>
    </svg>
    <svg class="floating-bg-icon" id="bg-icon-phone" viewBox="0 0 32 32">
        <path d="M6,6 H26 V10 H6 Z M4,12 H28 V28 H4 Z M11,19 A 5 5 0 1 0 21,19 A 5 5 0 1 0 11,19 M14,19 A 2 2 0 1 0 18,19 A 2 2 0 1 0 14,19"/>
    </svg>
    <svg class="floating-bg-icon" id="bg-icon-pc" viewBox="0 0 32 32">
        <path d="M4,4 H28 V20 H4 Z M6,6 H26 V18 H6 Z M12,21 H20 V25 H12 Z M2,26 H30 V28 H2 Z"/>
    </svg>

    <div class="terminal-container" id="main-interface">
        <div class="terminal">
            <h1>[ MINITEL X SYSTEM ]</h1>
            <div class="status">Statut : En ligne | Prêt pour ESP32</div>
            
            <form id="msgForm" action="/envoyer" method="GET">
                <textarea name="msg" placeholder="Entrez le message à transmettre..." required></textarea>
                <button type="submit">TRANSMETTRE LE MESSAGE</button>
            </form>
        </div>
    </div>

    <div id="animation-screen">
        <div class="scene">
            <div class="road-arc"></div>

            <svg class="moving-folder" viewBox="0 0 24 24">
                <path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/>
            </svg>

            <svg class="hardware-icon icon-left" width="45" height="45" viewBox="0 0 32 32">
                <path d="M4,4 H28 V20 H4 Z M6,6 H26 V18 H6 Z M12,21 H20 V25 H12 Z M2,26 H30 V28 H2 Z"/>
            </svg>

            <svg class="hardware-icon icon-right" width="45" height="45" viewBox="0 0 32 32">
                <path d="M4,4 H28 V20 H4 Z M6,6 H26 V18 H6 Z M2,22 H30 V26 H2 Z M8,23 H24 V24 H8 Z"/>
            </svg>
        </div>

        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
        <div class="loading-text">CONNEXION ESP32...<br>TRANSMISSION EN COURS</div>
    </div>

    <script>
        document.getElementById('msgForm').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('main-interface').style.display = 'none';
            document.getElementById('animation-screen').style.display = 'flex';
            setTimeout(() => {
                this.submit();
            }, 10000);
        });
    </script>

</body>
</html>
