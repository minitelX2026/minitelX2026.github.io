<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minitel 9 - Live Control</title>
    <style>
        /* Style général rétro Minitel / Terminal */
        body {
            background-color: #0d0d0d;
            color: #33ff33;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Effet de balayage CRT à l'écran */
        .crt-screen {
            width: 100%;
            height: 100%;
            max-width: 600px;
            max-height: 500px;
            border: 4px solid #33ff33;
            background-color: #1a1a1a;
            padding: 20px;
            box-shadow: 0 0 20px rgba(51, 255, 51, 0.5);
            position: relative;
            box-sizing: border-box;
        }

        /* En-tête avec les infos de compte */
        .header-info {
            position: absolute;
            top: 15px;
            left: 20px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* Zone centrale d'envoi de message */
        .main-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            margin-top: 20px;
        }

        h1 {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            width: 80%;
            gap: 10px;
        }

        input[type="text"] {
            background-color: #000;
            border: 2px solid #33ff33;
            color: #33ff33;
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            outline: none;
        }

        button {
            background-color: #33ff33;
            color: #000;
            border: none;
            padding: 12px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
        }

        button:disabled {
            background-color: #114411;
            color: #555;
            cursor: not-allowed;
        }

        /* --- STYLE DE LA POP-UP RÉTRO --- */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-box {
            background-color: #000;
            border: 3px double #33ff33;
            padding: 25px;
            width: 80%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 0 15px rgba(51, 255, 51, 0.3);
        }

        .modal-box h2 {
            font-size: 1.2rem;
            margin-top: 0;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .modal-box input {
            width: 90%;
            margin-bottom: 15px;
            text-align: center;
        }

        .error-msg {
            color: #ff3333;
            font-size: 0.85rem;
            margin-bottom: 10px;
            min-height: 18px;
        }
    </style>
</head>
<body>

    <div class="crt-screen">
        <!-- Affichage en haut à gauche -->
        <div class="header-info">Compte : <span id="affichage-pseudo">---</span></div>

        <!-- Contenu Principal -->
        <div class="main-content">
            <h1>Envoi de Message au Minitel</h1>
            <div class="input-group">
                <input type="text" id="message-input" placeholder="Tape ton message ici..." maxlength="40">
                <button id="btn-envoyer">Envoyer au chat</button>
            </div>
        </div>

        <!-- Pop-up d'inscription du Pseudo -->
        <div class="modal-overlay" id="pseudo-modal">
            <div class="modal-box">
                <h2>Choix du Pseudo</h2>
                <input type="text" id="pseudo-input" placeholder="Pseudo (3 à 10 car.)" maxlength="10">
                <div class="error-msg" id="modal-error"></div>
                <button id="btn-accepter" disabled>Accepter</button>
            </div>
        </div>
    </div>

    <script>
        // Ta liste de sécurité pour bloquer les bêtises
        const blacklist = [
            "merde", "connard", "connarde", "conard", "con", "conne", "salaud", "salope", "enfoire", "enfoiree",
            "batard", "batarde", "crevard", "crevarde", "pouffiasse", "poufiasse", "chieur", "chieuse",
            "filsdepute", "filsdeup", "fdp", "putain", "pute", "petasse", "biatch", "bordel", "garce",
            "couille", "couilles", "bite", "bites", "chatte", "chattes", "cul", "trousduc", "trouducul",
            "zeub", "zoub", "teub", "teube", "chneck", "beauf",
            "branleur", "branleuse", "branlette", "fouteur", "encule", "enculee", "nique", "niquer", 
            "niquemouk", "baise", "baiser", "suceur", "suceuse", "tocard", "tocarde", "fouillemerde",
            "tg", "ntm", "pd"
        ];

        // Éléments HTML
        const modalOverlay = document.getElementById('pseudo-modal');
        const pseudoInput = document.getElementById('pseudo-input');
        const btnAccepter = document.getElementById('btn-accepter');
        const modalError = document.getElementById('modal-error');
        const affichagePseudo = document.getElementById('affichage-pseudo');
        const messageInput = document.getElementById('message-input');
        const btnEnvoyer = document.getElementById('btn-envoyer');

        // Fonction pour vérifier si un texte contient un gros mot
        function contientMotInterdit(texte) {
            const texteMinuscule = texte.toLowerCase();
            return blacklist.some(mot => texteMinuscule.includes(mot));
        }

        // Étape 1 : Vérification au chargement de la page
        window.addEventListener('DOMContentLoaded', () => {
            const pseudoSauvegarde = localStorage.getItem('minitel_pseudo');
            
            if (pseudoSauvegarde) {
                // Si le pseudo existe déjà en mémoire, on masque la pop-up et on l'affiche en haut
                modalOverlay.style.display = 'none';
                affichagePseudo.textContent = pseudoSauvegarde;
            } else {
                // Sinon, on force l'affichage de la pop-up
                modalOverlay.style.display = 'flex';
            }
        });

        // Étape 2 : Gestion de la saisie dans la pop-up (Bouton actif/désactivé)
        pseudoInput.addEventListener('input', () => {
            const valeur = pseudoInput.value.trim();
            
            // On active le bouton uniquement si la taille est entre 3 et 10 caractères
            if (valeur.length >= 3 && valeur.length <= 10) {
                btnAccepter.disabled = false;
                modalError.textContent = ""; // Efface les erreurs pendant la frappe
            } else {
                btnAccepter.disabled = true;
            }
        });

        // Étape 3 : Validation du pseudo au clic sur "Accepter"
        btnAccepter.addEventListener('click', () => {
            const pseudoChoisi = pseudoInput.value.trim();

            // Vérification de la blacklist
            if (contientMotInterdit(pseudoChoisi)) {
                modalError.textContent = "Pseudo interdit ! 🛑";
                return;
            }

            // Si tout est valide, on enregistre définitivement dans la mémoire
            localStorage.setItem('minitel_pseudo', pseudoChoisi);
            
            // On met à jour l'affichage en haut à gauche
            affichagePseudo.textContent = pseudoChoisi;
            
            // On ferme la pop-up
            modalOverlay.style.display = 'none';
        });

        // Étape 4 : Envoi du message final combiné (Pseudo: Message)
        btnEnvoyer.addEventListener('click', () => {
            const message = messageInput.value.trim();
            const pseudo = localStorage.getItem('minitel_pseudo') || "Anonyme";

            if (message.length === 0) return;

            if (contientMotInterdit(message)) {
                alert("Pas de gros mots dans les messages ! 🛑");
                messageInput.value = "";
                return;
            }

            // C'est cette variable textFinal qui partira vers ton ESP32 !
            const textFinal = `${pseudo}: ${message}`;
            
            console.log("Envoi au Minitel :", textFinal);
            
            // TODO: Ajouter ici ta fonction fetch() ou WebSocket pour envoyer textFinal à l'ESP32

            // On vide la case message après envoi
            messageInput.value = "";
        });
    </script>
</body>
</html>
