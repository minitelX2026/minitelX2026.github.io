<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Minitel X - Boot Sequence</title>
    <style>
        /* Effet CRT Global */
        body { background: #000; color: #00ff33; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        .crt-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 100; }
        
        /* Chargement Initial */
        #boot-container { position: fixed; top:0; left:0; width:100%; height:100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99; }
        .pixel-art-line { border-bottom: 2px dashed #00ff33; width: 60%; margin: 20px 0; position: relative; }
        .progress-bar { width: 300px; height: 20px; border: 2px solid #00ff33; padding: 2px; }
        #bar-fill { width: 0%; height: 100%; background: #00ff33; transition: width 0.3s; }
    </style>
</head>
<body>
    <div class="crt-overlay"></div>

    <div id="boot-container">
        <div id="art-zone" style="height: 200px; display: flex; align-items: center; gap: 20px;">
            <div id="pc-icon">PC [ ]</div>
            <div class="pixel-art-line">
                <div id="file-packet" style="position:absolute; top:-10px; left:0; width:10px; height:10px; background:#fff;"></div>
            </div>
            <div id="esp-icon">ESP32 [ ]</div>
            <div id="minitel-icon">MINITEL [ ]</div>
        </div>

        <div class="progress-bar"><div id="bar-fill"></div></div>
        <p id="status-text">INITIALISATION...</p>
    </div>

    <script>
        const status = ["Chargement des donnees ESP32", "Verification tube cathodique", "Exploitation fichier...", "Connexion Minitel etablie"];
        let progress = 0;
        
        function boot() {
            const bar = document.getElementById('bar-fill');
            const txt = document.getElementById('status-text');
            const file = document.getElementById('file-packet');
            
            let interval = setInterval(() => {
                progress += 1;
                bar.style.width = progress + "%";
                file.style.left = progress + "%";
                
                if (progress % 25 === 0) txt.innerText = status[progress/25 - 1];
                
                // Glitch aléatoire
                if(Math.random() > 0.9) document.body.style.opacity = 0.5;
                else document.body.style.opacity = 1;

                if (progress >= 100) {
                    clearInterval(interval);
                    document.getElementById('boot-container').style.display = 'none';
                    // Ici on appellera la suite (Pseudo)
                }
            }, 100);
        }
        boot();
    </script>
</body>
</html>
