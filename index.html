<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Minitel X Terminal</title>
    <style>
        body { background: #000; color: #00ff33; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .crt { position: fixed; top:0; left:0; width:100%; height:100%; background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%), linear-gradient(90deg, rgba(0,255,51,0.06), rgba(0,255,51,0.02)); background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 1000; }
        
        #stage { width: 800px; height: 300px; border: 2px solid #00ff33; position: relative; display: flex; align-items: center; justify-content: space-around; padding: 20px; }
        .art { width: 80px; height: 60px; border: 2px solid #00ff33; display: flex; justify-content: center; align-items: center; position: relative; }
        
        #file { width: 10px; height: 10px; background: #00ff33; position: absolute; left: 60px; top: 145px; transition: all 0.1s linear; }
        .line { position: absolute; top: 150px; left: 80px; right: 80px; height: 2px; border-top: 2px dashed #00ff33; z-index: -1; }
        
        #interface, #boot { position: absolute; background: #000; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #interface { display: none; }
        textarea, input { width: 200px; background: #000; border: 1px solid #00ff33; color: #00ff33; padding: 10px; margin: 5px; }
        button { background: #00ff33; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="crt"></div>

    <div id="boot">
        <div id="stage">
            <div class="art">PC</div>
            <div class="line"></div>
            <div class="art">ESP</div>
            <div class="art">MINITEL</div>
            <div id="file"></div>
        </div>
        <div id="progress" style="width: 300px; height: 20px; border: 1px solid #00ff33; margin-top: 20px;">
            <div id="fill" style="width: 0%; height: 100%; background: #00ff33;"></div>
        </div>
        <p id="txt">INITIALISATION...</p>
    </div>

    <div id="interface">
        <h2>COMMUNICATION VIA ESP32</h2>
        <input id="p" placeholder="PSEUDO (1-15)" maxlength="15">
        <textarea id="m" placeholder="MESSAGE (1-25)" maxlength="25"></textarea>
        <button onclick="send()">ENVOYER</button>
    </div>

    <script>
        const status = ["CHARGEMENT ESP32", "CONNEXION TUBE", "ENVOI DONNEES"];
        let p = 0;
        const f = document.getElementById('file');
        
        let loop = setInterval(() => {
            p++;
            document.getElementById('fill').style.width = p + "%";
            f.style.left = (60 + (p * 6.5)) + "px";
            if (p % 33 === 0) document.getElementById('txt').innerText = status[p/33 - 1];
            
            // Glitch CRT
            if(Math.random() > 0.95) document.body.style.transform = "translateX(5px)";
            else document.body.style.transform = "translateX(0px)";

            if (p >= 100) {
                clearInterval(loop);
                document.getElementById('boot').style.display = 'none';
                document.getElementById('interface').style.display = 'flex';
            }
        }, 100);

        async function send() {
            const m = document.getElementById('m').value;
            const p = document.getElementById('p').value;
            const bad = ["con", "merde", "pute"]; 
            if(bad.some(w => m.toLowerCase().includes(w))) return alert("INSULTE DETECTEE");
            
            await fetch('https://ntfy.sh/minitel-tom-2026', {
                method: 'POST',
                body: p + " " + m
            });
            alert("MESSAGE TRANSMIS");
            document.getElementById('m').value = "";
        }
    </script>
</body>
</html>
