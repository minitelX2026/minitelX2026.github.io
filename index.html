<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minitel X Terminal</title>
    <style>
        body {
            background-color: #040608;
            color: #00ff33;
            font-family: 'Courier New', Courier, monospace;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; overflow: hidden; position: relative;
        }

        /* --- FILTRE CRT INTENSIFIÉ + SCANLINES --- */
        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.5) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.05), rgba(0, 0, 255, 0.05));
            z-index: 99998; background-size: 100% 3px, 3px 100%; pointer-events: none;
        }

        /* --- GLITCH ALÉATOIRE --- */
        .glitch-effect {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 99999;
            background: rgba(0, 255, 51, 0.1);
            display: none;
        }

        /* --- ARRIÈRE-PLAN : ICÔNES PIXEL ART --- */
        .floating-bg-icon {
            position: absolute; fill: none; stroke: #00ff33; stroke-width: 1.5;
            opacity: 0.15; filter: drop-shadow(0 0 4px #00ff33);
            animation: float-around 14s infinite ease-in-out; z-index: 1;
        }
        
        @keyframes float-around {
            0%, 100% { transform: translateY(0) translateX(0) rotate(0deg); }
            50% { transform: translateY(-20px) translateX(10px) rotate(6deg); }
        }

        /* --- LE RESTE DU DESIGN (Identique) --- */
        .terminal-container { z-index: 10; width: 90%; max-width: 400px; }
        .terminal { background-color: rgba(0, 0, 0, 0.9); border: 2px solid #00ff33; border-radius: 10px; padding: 20px; box-shadow: 0 0 20px rgba(0, 255, 51, 0.2); }
        h1 { font-size: 17pt; text-align: center; margin-bottom: 20px; text-shadow: 0 0 5px #00ff33; }
        textarea { width: 100%; height: 100px; background: #000; color: #00ff33; border: 1px solid #00ff33; padding: 10px; box-sizing: border-box; }
        #submitBtn { width: 100%; margin-top: 15px; background: #00ff33; color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; }
        
        #animation-screen { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #000; z-index: 9999; flex-direction: column; justify-content: center; align-items: center; }
        .moving-folder { position: absolute; width: 28px; height: 28px; fill: #00ff33; offset-path: path('M 35 175 A 125 125 0 0 1 285 175'); animation: electric-travel 3s infinite linear; }
        @keyframes electric-travel { 
            0% { offset-distance: 0%; } 20% { offset-distance: 20%; } 40% { offset-distance: 50%; } 60% { offset-distance: 50%; } 100% { offset-distance: 100%; }
        }
    </style>
</head>
<body>

    <div class="glitch-effect" id="glitch"></div>

    <!-- Icônes (Positionnement simplifié) -->
    <svg class="floating-bg-icon" style="width:70px; top:10%; left:10%" viewBox="0 0 40 40"><path d="M6,14 H14 V12 H26 V14 H34 V22 H30 V18 H10 V22 H6 Z"/></svg>

    <div class="terminal-container" id="main-interface">
        <div class="terminal">
            <h1>[ MINITEL X SYSTEM ]</h1>
            <textarea id="msgTextarea" placeholder="Message..."></textarea>
            <button id="submitBtn">TRANSMETTRE</button>
        </div>
    </div>

    <div id="animation-screen">
        <svg class="moving-folder" viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
    </div>

    <script>
        // Moteur de glitch irrégulier
        function triggerGlitch() {
            const glitch = document.getElementById('glitch');
            // Zones de glitch aléatoires
            glitch.style.display = 'block';
            glitch.style.clipPath = `polygon(0% ${Math.random()*100}%, 100% ${Math.random()*100}%, 100% ${Math.random()*100}%, 0% ${Math.random()*100}%)`;
            
            setTimeout(() => {
                glitch.style.display = 'none';
                // Relance entre 3 et 7 secondes
                setTimeout(triggerGlitch, Math.random() * 4000 + 3000);
            }, 150); // Le bug dure 150ms
        }
        triggerGlitch();

        document.getElementById('submitBtn').onclick = () => {
            document.getElementById('main-interface').style.display = 'none';
            document.getElementById('animation-screen').style.display = 'flex';
        };
    </script>
</body>
</html>
