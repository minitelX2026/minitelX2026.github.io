<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minitel X Terminal Extreme Edition</title>
    <style>
        /* --- RESET GLOBAL ET CONFIGURATION DE BASE --- */
        *, *::before, *::after { 
            box-sizing: border-box; 
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #040608;
            color: #00ff33;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
            user-select: none;
        }

        /* --- FILTRE CRT RETRO EMBÉLI ET INTENSE --- */
        body::before {
            content: " "; 
            display: block; 
            position: fixed; 
            top: 0; 
            left: 0; 
            bottom: 0; 
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.45) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.04));
            z-index: 99998; 
            background-size: 100% 3px, 5px 100%; 
            pointer-events: none;
        }

        /* --- GLITCH DE GRÉSILLEMENT CATHODIQUE --- */
        .glitch-overlay {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0, 255, 51, 0.15), rgba(0, 255, 51, 0.15) 2px, transparent 2px, transparent 4px);
            pointer-events: none; 
            z-index: 99999; 
            display: none; 
            opacity: 0.8;
        }

        /* --- FOND MATRICIEL VRAIMENT DENSIFIÉ --- */
        .code-rain-bg {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            z-index: 0; 
            opacity: 0.08; 
            pointer-events: none; 
            overflow: hidden;
            display: flex; 
            justify-content: space-between; 
            font-size: 12pt; 
            font-weight: bold; 
            line-height: 1.3;
        }
        
        .code-column {
            display: flex; 
            flex-direction: column; 
            white-space: nowrap;
            animation: fall linear infinite;
        }
        
        @keyframes fall {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        /* --- ICÔNES RETRO FLOTTANTES EN COMPLEXE CSS AMÉLIORÉ --- */
        .floating-bg-icon {
            position: absolute; 
            fill: none; 
            stroke: #00ff33; 
            stroke-width: 1.5;
            stroke-linecap: square; 
            stroke-linejoin: miter; 
            opacity: 0.15;
            filter: drop-shadow(0 0 5px rgba(0, 255, 51, 0.4));
            z-index: 1;
        }
        
        #bg-icon-ps { width: 75px; height: 50px; top: 8%; left: 6%; animation: float-ps 16s infinite ease-in-out; }
        #bg-icon-ps1 { width: 65px; height: 65px; top: 22%; right: 10%; animation: float-ps1 14s infinite ease-in-out; }
        #bg-icon-mini { width: 65px; height: 65px; bottom: 30%; left: 5%; animation: float-mini 18s infinite ease-in-out; }
        #bg-icon-phone { width: 65px; height: 65px; bottom: 12%; left: 45%; animation: float-phone 15s infinite ease-in-out; }
        #bg-icon-pc { width: 65px; height: 65px; bottom: 15%; right: 8%; animation: float-pc 13s infinite ease-in-out; }

        @keyframes float-ps {
            0%, 100% { transform: translateY(0) translateX(0) rotate(0deg) scale(1); }
            33% { transform: translateY(-12px) translateX(10px) rotate(3deg) scale(1.02); }
            66% { transform: translateY(5px) translateX(-5px) rotate(-2deg) scale(0.98); }
        }
        @keyframes float-ps1 {
            0%, 100% { transform: translateY(0) translateX(0) rotate(0deg); }
            50% { transform: translateY(-20px) translateX(-15px) rotate(-5deg); }
        }
        @keyframes float-mini {
            0%, 100% { transform: translateY(0) translateX(0) rotate(0deg); }
            40% { transform: translateY(15px) translateX(8px) rotate(4deg); }
            70% { transform: translateY(-10px) translateX(-4px) rotate(-2deg); }
        }
        @keyframes float-phone {
            0%, 100% { transform: translateY(0) translateX(0) rotate(0deg); }
            50% { transform: translateY(-8px) translateX(12px) rotate(2deg); }
        }
        @keyframes float-pc {
            0%, 100% { transform: translateY(0) translateX(0) rotate(0deg); }
            50% { transform: translateY(18px) translateX(-10px) rotate(-4deg); }
        }

        /* --- POP-UPS / STRUCTURES DES MODALS MODULAIRES --- */
        .modal-overlay {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh;
            background-color: rgba(4, 6, 8, 0.97); 
            z-index: 10000;
            display: none; 
            justify-content: center; 
            align-items: center;
        }
        
        .modal-box {
            background-color: #0c111a; 
            border: 2px solid #00ff33; 
            border-radius: 8px;
            width: 85%; 
            max-width: 420px; 
            padding: 25px; 
            box-shadow: 0 0 35px rgba(0, 255, 51, 0.35);
            position: relative;
        }
        
        .modal-title { 
            font-size: 14pt; 
            font-weight: bold; 
            text-align: center; 
            margin-top: 0; 
            border-bottom: 1px dashed #00ff33; 
            padding-bottom: 12px; 
            letter-spacing: 1px;
        }
        
        .modal-text { 
            font-size: 10pt; 
            line-height: 1.6; 
            text-align: justify; 
            margin: 18px 0; 
            color: #e6edf3; 
        }
        
        .channel-highlight { 
            color: #ff3333; 
            font-weight: bold; 
            background: rgba(255, 51, 51, 0.12); 
            padding: 2px 5px; 
            border-radius: 3px;
        }
        
        .modal-checkbox-zone { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            font-size: 9.5pt; 
            margin-top: 22px; 
        }
        
        .modal-checkbox-zone input { 
            accent-color: #00ff33; 
            width: 18px; 
            height: 18px; 
            cursor: pointer;
        }
        
        .close-btn { 
            position: absolute; 
            top: 10px; 
            right: 15px; 
            font-size: 18pt; 
            cursor: pointer; 
            color: #221414; 
            pointer-events: none; 
            transition: color 0.3s;
        }
        
        .close-btn.active { 
            color: #ff3333; 
            pointer-events: auto; 
        }
        
        .modal-action-btn { 
            width: 100%; 
            margin-top: 18px; 
            background-color: #151d2a; 
            color: #444; 
            border: 1px solid #222; 
            padding: 14px; 
            font-family: monospace; 
            font-weight: bold; 
            border-radius: 5px; 
            pointer-events: none; 
            text-transform: uppercase; 
            font-size: 10pt;
            transition: all 0.3s;
        }
        
        .modal-action-btn.active { 
            background-color: #00ff33; 
            color: #040608; 
            border: none; 
            cursor: pointer; 
            pointer-events: auto; 
            box-shadow: 0 0 18px rgba(0, 255, 51, 0.45); 
        }

        /* Formulaire Spécial de configuration de Pseudo */
        .pseudo-input-field {
            width: 100%; 
            background-color: #040608; 
            color: #00ff33; 
            border: 1px solid #00ff33;
            border-radius: 5px; 
            padding: 14px; 
            font-family: monospace; 
            font-size: 13pt;
            text-align: center; 
            margin-top: 18px; 
            outline: none;
            letter-spacing: 2px;
        }
        
        .pseudo-input-field:focus { 
            box-shadow: 0 0 12px rgba(0, 255, 51, 0.6); 
        }
        
        .error-msg { 
            color: #ff3333; 
            font-size: 9.5pt; 
            text-align: center; 
            margin-top: 12px; 
            font-weight: bold; 
            min-height: 20px; 
        }

        /* --- TERMINAL DE L'INTERFACE PRINCIPALE --- */
        .terminal-container { 
            z-index: 10; 
            width: 90%; 
            max-width: 420px; 
            display: none; 
            position: relative; 
        }
        
        .account-header { 
            font-size: 10.5pt; 
            font-weight: bold; 
            color: #00ff33; 
            margin-bottom: 10px; 
            text-shadow: 0 0 6px #00ff33; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }
        
        .terminal { 
            background-color: rgba(12, 17, 26, 0.93); 
            border: 2px solid #00ff33; 
            border-radius: 10px; 
            padding: 25px; 
            box-shadow: 0 0 30px rgba(0, 255, 51, 0.3); 
        }
        
        h1 { 
            font-size: 17pt; 
            text-align: center; 
            margin: 0 0 6px 0; 
            text-shadow: 0 0 10px #00ff33; 
            letter-spacing: 1px;
        }
        
        .status { 
            text-align: center; 
            font-size: 9pt; 
            color: #00aa22; 
            margin-bottom: 22px; 
            font-weight: bold;
        }
        
        textarea { 
            width: 100%; 
            height: 120px; 
            background-color: #040608; 
            color: #00ff33; 
            border: 1px solid #00ff33; 
            border-radius: 5px; 
            padding: 12px; 
            font-family: monospace; 
            font-size: 11pt; 
            resize: none; 
            line-height: 1.4;
        }
        
        textarea:focus { 
            outline: none; 
            box-shadow: 0 0 12px rgba(0, 255, 51, 0.55); 
        }
        
        #submitBtn { 
            width: 100%; 
            margin-top: 18px; 
            background-color: #00ff33; 
            color: #040608; 
            border: none; 
            padding: 14px; 
            font-size: 11pt; 
            font-weight: bold; 
            font-family: monospace; 
            cursor: pointer; 
            border-radius: 5px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            transition: background-color 0.2s;
        }
        
        #submitBtn:hover { 
            background-color: #00cc2a; 
            box-shadow: 0 0 15px #00ff33; 
        }

        /* --- ÉCRAN DE DÉMARRAGE (BOOT) --- */
        #boot-screen { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            background: #040608; 
            z-index: 20000; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            color: #00ff33; 
        }
    </style>
</head>
<body>

    <div id="boot-screen">
        <div style="font-size: 24pt; margin-bottom: 20px;">MINITEL 9 SYSTEM</div>
        <div id="boot-status">INITIALISATION MATÉRIELLE...</div>
    </div>

    <div class="terminal-container" id="main-interface">
        <div class="account-header" id="affichagePseudo"></div>
        <div class="terminal">
            <h1>ENTRÉE DONNÉES</h1>
            <div class="status">CONNEXION ESP32 ACTIVE</div>
            <form onsubmit="gererEnvoiFormulaire(event)">
                <textarea id="msgTextarea" placeholder="Écrire le commentaire ici..." maxlength="100"></textarea>
                <button type="submit" id="submitBtn">Transmettre</button>
            </form>
        </div>
    </div>

    <script>
        // --- LOGIQUE DE DÉMARRAGE CORRIGÉE ---
        window.onload = () => {
            const status = document.getElementById('boot-status');
            
            // Séquence de démarrage
            setTimeout(() => status.textContent = "CHARGEMENT DES PILOTES...", 1500);
            setTimeout(() => status.textContent = "SYNCHRONISATION ESP32...", 3000);
            
            // Transition finale
            setTimeout(() => {
                const bootScreen = document.getElementById('boot-screen');
                if (bootScreen) bootScreen.style.display = 'none';
                
                // Affichage de l'interface principale
                const mainInterface = document.getElementById('main-interface');
                if (mainInterface) mainInterface.style.display = 'block';
                
                const pseudoSauvegarde = localStorage.getItem('minitel_pseudo');
                if (pseudoSauvegarde) {
                    document.getElementById('affichagePseudo').textContent = pseudoSauvegarde;
                }
            }, 5000); 
        };

        // --- MODULE D'ENVOI VERS NTFY (Intégré) ---
        async function gererEnvoiFormulaire(event) {
            event.preventDefault();
            const msgInput = document.getElementById('msgTextarea');
            const msg = msgInput.value;
            const pseudo = localStorage.getItem('minitel_pseudo') || "Utilisateur";
            
            // Nettoyage standard Minitel
            const cleanMsg = msg.normalize("NFD").replace(/[\u0300-\u036f]/g, "").substring(0, 100);
            
            try {
                const response = await fetch('https://ntfy.sh/minitel-tom-2026', {
                    method: 'POST',
                    body: `${pseudo} : ${cleanMsg}`
                });
                if (response.ok) {
                    msgInput.value = "";
                    alert("TRANSMISSION RÉUSSIE");
                }
            } catch (err) {
                console.error("ERREUR DE LIAISON ESP32", err);
            }
        }
    </script>
</body>
</html>
