<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Minitel X Terminal</title>
    <style>
        body { background: #000; color: #00ff33; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .crt { position: fixed; top:0; left:0; width:100%; height:100%; background: linear-gradient(rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.4) 50%); background-size: 100% 4px; pointer-events: none; z-index: 1000; }
        .box { border: 2px solid #00ff33; padding: 20px; width: 400px; text-align: center; background: #000; }
        .art-box { display: flex; justify-content: space-between; align-items: center; margin: 20px 0; height: 100px; }
        .pixel-pc, .pixel-esp, .pixel-minitel { border: 2px solid #00ff33; display:flex; align-items:center; justify-content:center; }
        .pixel-pc { width: 60px; height: 40px; }
        .pixel-esp { width: 40px; height: 30px; }
        .pixel-minitel { width: 70px; height: 50px; font-size: 8px; overflow: hidden; }
        .screen { display: none; flex-direction: column; align-items: center; }
        input, textarea, button { width: 90%; background: #000; border: 1px solid #00ff33; color: #00ff33; padding: 10px; margin: 5px; }
        button { background: #00ff33; color: #000; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="crt"></div>

    <div id="boot" class="screen" style="display: flex;">
        <div class="box">
            <div class="art-box">
                <div class="pixel-pc">PC</div>
                <div id="file" style="width:10px; height:10px; background:#00ff33; position:absolute; left: 80px;"></div>
                <div class="pixel-esp">ESP</div>
                <div class="pixel-minitel" id="m-screen">||||||</div>
            </div>
            <div style="width:100%; height:10px; border:1px solid #00ff33;"><div id="fill" style="width:0%; height:100%; background:#00ff33;"></div></div>
            <p id="txt">INITIALISATION...</p>
        </div>
    </div>

    <div id="terms" class="screen"><div class="box"><h3>CONDITIONS</h3><p>Pas d'insultes. 1-25 chars. Live : team-banane_9 YTB</p><label><input type="checkbox" id="check"> J'accepte</label><button onclick="next('pseudo')">VALIDER</button></div></div>
    <div id="pseudo-screen" class="screen"><div class="box"><h3>PSEUDO</h3><input id="p-input" maxlength="15"><button onclick="savePseudo()">VALIDER</button></div></div>
    <div id="terminal" class="screen"><div class="box"><h3>COMMUNICATION ESP32</h3><textarea id="m-input" maxlength="25"></textarea><button onclick="send()">ENVOYER</button></div></div>

    <script>
        let p = 0;
        let loop = setInterval(() => {
            p++; document.getElementById('fill').style.width = p + "%";
            document.getElementById('file').style.left = (80 + (p * 2.5)) + "px";
            if(p % 20 === 0) document.getElementById('m-screen').innerText += "|||";
            if (p >= 100) { clearInterval(loop); next('terms'); }
        }, 100);

        function next(id) {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            if (id === 'pseudo' && !document.getElementById('check').checked) return alert("Cochez les conditions");
            if (id === 'pseudo' && localStorage.getItem('minitelPseudo')) document.getElementById('terminal').style.display = 'flex';
            else document.getElementById(id + '-screen').style.display = 'flex';
        }

        function savePseudo() {
            let val = document.getElementById('p-input').value;
            if(val) { localStorage.setItem('minitelPseudo', val); next('terminal'); }
        }

        async function send() {
            const m = document.getElementById('m-input').value;
            const lastSend = localStorage.getItem('lastSend') || 0;
            const now = Date.now();
            
            if (now - lastSend < 10000) return alert("Attendez 10s avant de renvoyer.");

            const bad = ["con", "merde", "pute", "encule", "connard", "salope", "batard", "fdp", "tg"];
            if(bad.some(w => m.toLowerCase().includes(w))) return alert("Insultes détectées, veuillez changer de mots.");

            const p = localStorage.getItem('minitelPseudo');
            await fetch('https://ntfy.sh/minitel-tom-2026', { method: 'POST', body: p + " " + m });
            
            localStorage.setItem('lastSend', now);
            alert("MESSAGE TRANSMIS");
            document.getElementById('m-input').value = "";
        }
    </script>
</body>
</html>
