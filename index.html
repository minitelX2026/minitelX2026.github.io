<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Minitel X Terminal Extreme</title>
    <style>
        body { background: #000; color: #00ff33; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        .crt-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 1000; }
        #boot-container, #main-interface { position: fixed; top:0; left:0; width:100%; height:100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; background: #000; }
        .progress-bar { width: 300px; height: 20px; border: 2px solid #00ff33; margin-top: 20px; }
        #bar-fill { width: 0%; height: 100%; background: #00ff33; }
        .pixel-art-line { border-bottom: 2px dashed #00ff33; width: 60%; margin: 20px 0; position: relative; }
        #file-packet { position:absolute; top:-10px; left:0; width:10px; height:10px; background:#fff; }
        #main-interface { display: none; }
        input, textarea { background: #000; color: #00ff33; border: 1px solid #00ff33; padding: 10px; width: 250px; }
        button { background: #00ff33; border: none; padding: 10px; margin-top: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="crt-overlay"></div>

    <div id="boot-container">
        <h1>MINITEL X SYSTEM BOOT</h1>
        <div class="pixel-art-line"><div id="file-packet"></div></div>
        <div class="progress-bar"><div id="bar-fill"></div></div>
        <p id="status-text">INITIALISATION EN COURS...</p>
    </div>

    <div id="main-interface">
        <h2>COMMUNICATION ESP32</h2>
        <input type="text" id="pseudo-input" placeholder="TON PSEUDO (MAX 15)" maxlength="15">
        <textarea id="msg-input" placeholder="MESSAGE (MAX 25)" maxlength="25"></textarea>
        <button onclick="envoyerMessage()">ENVOYER LE MESSAGE</button>
    </div>

    <script>
        const status = ["Chargement des données ESP32", "Verification tube cathodique", "Exploitation fichier...", "Connexion Minitel établie"];
        let progress = 0;
        const bar = document.getElementById('bar-fill');
        const file = document.getElementById('file-packet');
        const txt = document.getElementById('status-text');

        let interval = setInterval(() => {
            progress += 1;
            bar.style.width = progress + "%";
            file.style.left = progress + "%";
            if (progress % 25 === 0) txt.innerText = status[progress/25 - 1];
            
            // Effet glitch aléatoire
            if(Math.random() > 0.9) document.body.style.filter = "invert(1)";
            else document.body.style.filter = "none";

            if (progress >= 100) {
                clearInterval(interval);
                document.getElementById('boot-container').style.display = 'none';
                document.getElementById('main-interface').style.display = 'flex';
            }
        }, 100);

        async function envoyerMessage() {
            const msg = document.getElementById('msg-input').value;
            const pseudo = document.getElementById('pseudo-input').value || "Tom";
            const blacklist = ["insulte1", "insulte2"]; // Ajoute tes mots ici
            
            if(blacklist.some(v => msg.toLowerCase().includes(v))) {
                alert("Message interdit !");
                return;
            }

            if(msg.length > 0 && msg.length <= 25) {
                await fetch('https://ntfy.sh/minitel-tom-2026', {
                    method: 'POST',
                    body: pseudo + " " + msg
                });
                alert("Message envoyé avec succès.");
                document.getElementById('msg-input').value = "";
            } else {
                alert("Erreur : Pseudo ou message invalide.");
            }
        }
    </script>
</body>
</html>
